name: Bug report
description: Report a reproducible problem in Nito Wallet.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Never include a recovery phrase, private key, password or credential.
  - type: input
    id: version
    attributes:
      label: Wallet version
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
